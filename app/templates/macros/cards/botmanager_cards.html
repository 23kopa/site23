{% macro render_botmanager_card(card) %}
<div class="{{ card.wrapper_class }}">

    <div class="card {{ card.card_class | default('') }}">
        <div class="card-body">

            <h5 class="card-title {{ card.title_class | default('') }}">
                <i class="fas fa-{{ card.icon | default('question-circle') }} me-2"></i>{{ card.title }}
            </h5>
            <p class="card-text">{{ card.content | safe }}</p>
            {% if card.button_text and card.button_url %}
            <button type="button" class="{{ card.button_class }}" data-bs-toggle="modal"
                data-bs-target="#modal-{{ card.id }}">
            </button>
            <div class="btn-dashboard-label">{{ card.button_text }}</div>
            {% endif %}
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal fade" id="modal-{{ card.id }}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">{{ card.modal_title or card.title }}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    {{ card.modal_content | safe }}
                </div>
                <!--                 <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div> -->
            </div>
        </div>
    </div>

</div>
{% endmacro %}
