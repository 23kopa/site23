{% extends 'base/base.html' %}

{% block title %}Главная{% endblock %}

{% block content %}
<!-- Карточка 1 -->
<div class="card-2grid-layout">
    <div class="one-1column">
        <div class="auth-container">
            <div class="singin">
                <div class="card">
                    <div class="card-content">

                        <h2>Вход</h2>

                        <form method="POST" action="/login" class="flex flex-col gap-4">
                            <input type="text" name="username" placeholder="Логин">

                            <!-- Пароль с иконкой внутри поля -->
                            <div class="relative">
                                <input id="password" type="password" name="password" placeholder="Пароль">

                                <!-- Иконка глаза -->
                                <span id="togglePassword"
                                    class="absolute right-2 top-1/2 transform -translate-y-1/2 cursor-pointer text-white">
                                    👁
                                </span>
                            </div>
                        </form>

                        <div class="buttons-container">
                            <button class="btn btn-in">Вход</button>
                            <a href="{{ url_for('register') }}" class="btn btn-in">Регистрация</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Скрипт показа/скрытия пароля -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");

        togglePassword.addEventListener("click", function () {
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);

            // Меняем иконку
            togglePassword.textContent = type === "password" ? "👁" : "🙈";
        });
    });
</script>


{% endblock %}
